name: Release
on:
  push:
    tags:
      - "*.*.*"

jobs:
  release:
    name: "Release"
    runs-on: ubuntu-latest
    steps:
      - name: "Fetch Sources"
        uses: actions/checkout@v7
      - name: "Setup Java 25"
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: 25
      - name: "Setup gradle"
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          cache-cleanup: on-success
      - name: "Get version from tag"
        id: version
        run: echo VERSION=${GITHUB_REF/refs\/tags\//} >> $GITHUB_OUTPUT
      - name: "Publish plugin"
        run: ./gradlew publishPlugins -Pversion=${{ steps.version.outputs.VERSION }} -Pgradle.publish.key=${{ secrets.GRADLE_PUBLISH_KEY }} -Pgradle.publish.secret=${{ secrets.GRADLE_PUBLISH_SECRET }}
      - name: "Create Release note"
        run: |
          awk -v ver="$1" '
            /^## / { if (p) { exit }; p=1; next } p && NF
          ' ./CHANGELOG.md > RELEASE.md
      - name: "Create release"
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE.md

